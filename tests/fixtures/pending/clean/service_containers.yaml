name: Service Containers

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20
      env:
        NODE_ENV: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    continue-on-error: true
    steps:
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/test
          REDIS_URL: redis://redis:6379

  build_image:
    runs-on: [linux, self-hosted]
    snapshot: my-custom-image
    steps:
      - uses: actions/checkout@v4

      - name: Setup image
        run: echo "configuring"
