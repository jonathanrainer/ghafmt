name: Variable Substitutions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
      environment:
        description: Deploy target
        type: choice
        options:
          - staging
          - production
      log_level:
        type: string
        default: info

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha-short }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Extract metadata
        id: meta
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          echo "sha-short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

  build:
    needs: setup
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.sha_short }}
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          echo "Building version ${{ needs.setup.outputs.version }}"
          echo "Commit: ${{ needs.setup.outputs.sha_short }}"
          docker build \
            --build-arg VERSION=${{ env.VERSION }} \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t myapp:${{ env.IMAGE_TAG }} .

      - name: Login to registry
        if: ${{ !inputs.dry_run && github.event_name == 'workflow_dispatch' }}
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Push image
        if: ${{ !inputs.dry_run }}
        run: |
          docker tag myapp:${{ env.IMAGE_TAG }} ${{ env.FULL_TAG }}
          docker push ${{ env.FULL_TAG }}
        env:
          FULL_TAG: ${{ vars.REGISTRY_URL }}/${{ github.repository }}:${{ env.IMAGE_TAG }}

  deploy:
    needs: [build, setup]
    if: ${{ always() && !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.app-url }}
    concurrency:
      group: deploy-${{ inputs.environment || 'staging' }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ needs.setup.outputs.version }} to ${{ inputs.environment || 'staging' }}
        id: deploy
        run: |
          ./deploy.sh \
            --env "${{ inputs.environment || 'staging' }}" \
            --version "${{ needs.setup.outputs.version }}" \
            --commit "${{ needs.setup.outputs.sha_short }}" \
            --log-level "${{ inputs.log_level || 'info' }}"
          echo "app-url=https://${{ inputs.environment || 'staging' }}.example.com" >> "$GITHUB_OUTPUT"
        env:
          APP_VERSION: ${{ needs.setup.outputs.version }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post status
        if: ${{ always() }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deploy of ${{ needs.setup.outputs.version }} to ${{ inputs.environment || 'staging' }}: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.repository }}* deploy\nVersion: `${{ needs.setup.outputs.version }}`\nEnvironment: `${{ inputs.environment || 'staging' }}`\nStatus: ${{ job.status }}\nActor: ${{ github.actor }}\n<${{ steps.deploy.outputs.app-url }}|View App>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
