name: Check GitHub Actions Workflows

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  actionlint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # 1.7.12

  ghafmt:
    name: Format
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build ghafmt
        run: cargo build --release

      - name: Check workflow formatting
        run: |
          mapfile -t ACTION_FILES < <(find . \( -name "action.yml" -o -name "action.yaml" \) \
            ! -path '*/.git/*' ! -path '*/node_modules/*' 2>/dev/null)
          ./target/release/ghafmt --mode=check .github/workflows/ "${ACTION_FILES[@]}"
