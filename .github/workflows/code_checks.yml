name: Run Code Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --component rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install actionlint
        run: |
          TARBALL="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          BASE_URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl -fsSL "${BASE_URL}/${TARBALL}" -o /tmp/actionlint.tar.gz
          EXPECTED=$(curl -fsSL "${BASE_URL}/actionlint_${ACTIONLINT_VERSION}_checksums.txt" \
            | grep "${TARBALL}" | awk '{print $1}')
          echo "${EXPECTED}  /tmp/actionlint.tar.gz" | sha256sum --check
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
        env:
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: 1.7.11

      - name: Run tests
        run: cargo test

  deny:
    name: Security Advisories
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check
