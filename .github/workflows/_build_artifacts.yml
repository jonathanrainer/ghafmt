name: Build Artifacts

on:
  workflow_call:
    inputs:
      retention_days:
        description: "Number of days to retain uploaded artifacts"
        type: number
        required: false
        default: 90
      version:
        description: "Version to set in Cargo.toml before building (e.g. 0.0.0-nightly.20260315.abc1234)"
        type: string
        required: true

jobs:
  build_artifacts:
    name: Build Artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We'd like to include other architectures too, however:
        # - x86_64-pc-windows-msvc is excluded until libfyaml compiles cleanly
        # under MSVC (tracked for v3). The C sources use GNU statement
        # expressions, mmap, and POSIX headers with no _WIN32 guards — this
        # requires upstream changes to libfyaml, not just fyaml-sys.
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Set Cargo version
        uses: ./.github/actions/set-cargo-version
        with:
          version: ${{ inputs.version }}

      - name: Set up Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: latest

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@3a911424851a96b72dc168c8dd71fd98ed215d66 # v2.68.36
        with:
          tool: cargo-zigbuild

      - name: Build
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Compute artifact prefix
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "prefix=ghafmt-${VERSION#*-}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package artifact
        run: tar -czf "${{ steps.version.outputs.prefix }}-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" ghafmt

      - name: Compute checksum
        run: |
          sha256sum "${{ steps.version.outputs.prefix }}-${{ matrix.target }}.tar.gz" \
            | awk '{print $1}' \
            > "${{ steps.version.outputs.prefix }}-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.version.outputs.prefix }}-${{ matrix.target }}
          path: ${{ steps.version.outputs.prefix }}-${{ matrix.target }}.*
          retention-days: ${{ inputs.retention_days }}
