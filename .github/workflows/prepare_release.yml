name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      override_version:
        description: "Override the computed release version (e.g. 0.1.0)"
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Knope
        uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          # renovate: datasource=github-releases depName=knope-dev/knope
          version: 0.22.3

      - name: Prepare release
        run: knope prepare-release --verbose ${{ inputs.override_version && format('--override-version {0}', inputs.override_version) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
