name: Build Docker Image

on:
  workflow_call:
    inputs:
      build_metadata:
        description: "Forwarded as GHAFMT_BUILD_METADATA build-arg (e.g. nightly.20260315.abc1234)"
        type: string
        required: false
        default: ""
      tag_latest:
        description: "Also push :latest tag"
        type: boolean
        required: false
        default: false
      version:
        description: "Tag suffix, e.g. 0.2.0 or nightly"
        type: string
        required: true

jobs:
  build_and_push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          labels: |
            org.opencontainers.image.version=${{ inputs.build_metadata != '' && inputs.build_metadata || inputs.version }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.tag_latest }}

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          build-args: GHAFMT_BUILD_METADATA=${{ inputs.build_metadata }}
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
