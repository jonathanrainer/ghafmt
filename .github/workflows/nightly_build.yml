name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  setup:
    name: Compute Build Metadata
    runs-on: ubuntu-24.04
    outputs:
      display_version: ${{ steps.version.outputs.display_version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Compute nightly version
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=0.0.0-nightly.${DATE}.${SHA}" >> "$GITHUB_OUTPUT"
          echo "display_version=nightly.${DATE}.${SHA}" >> "$GITHUB_OUTPUT"

  build_artifacts:
    name: Build Artifacts
    needs: setup
    uses: ./.github/workflows/_build_artifacts.yml
    with:
      version: ${{ needs.setup.outputs.version }}
      retention_days: 7

  build_docker:
    name: Build Docker Image
    needs: setup
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build_docker.yml
    with:
      image_tag: nightly
      tag_latest: false
      version: ${{ needs.setup.outputs.version }}

  publish_nightly:
    name: Publish Nightly Release
    needs: [build_artifacts, build_docker, setup]
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: artifacts

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          gh release create nightly artifacts/* \
            --prerelease \
            --title "Nightly Build (${{ needs.setup.outputs.display_version }})" \
            --notes "Automated nightly build from \`${{ github.sha }}\`.

          ## Docker Image
          \`\`\`
          docker pull ghcr.io/${{ github.repository }}:nightly
          \`\`\`" \
            --target "${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
