name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  setup:
    name: Compute Build Metadata
    runs-on: ubuntu-latest
    outputs:
      build_metadata: ${{ steps.meta.outputs.build_metadata }}
    steps:
      - id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "build_metadata=nightly.${DATE}.${SHA}" >> "$GITHUB_OUTPUT"

  build_artifacts:
    name: Build Artifacts
    needs: setup
    uses: ./.github/workflows/_build_artifacts.yml
    with:
      build_metadata: ${{ needs.setup.outputs.build_metadata }}
      retention_days: 7

  build_docker:
    name: Build Docker Image
    needs: setup
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build_docker.yml
    with:
      version: nightly
      tag_latest: false
      build_metadata: ${{ needs.setup.outputs.build_metadata }}

  publish_nightly:
    name: Publish Nightly Release
    needs: [build_artifacts, build_docker, setup]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: artifacts

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          gh release create nightly artifacts/* \
            --prerelease \
            --title "Nightly Build (${{ needs.setup.outputs.build_metadata }})" \
            --notes "Automated nightly build from \`${{ github.sha }}\`.

          ## Docker Image
          \`\`\`
          docker pull ghcr.io/${{ github.repository }}:nightly
          \`\`\`" \
            --target "${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
