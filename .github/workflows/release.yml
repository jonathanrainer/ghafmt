name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  issues: write

jobs:
  build_artifacts:
    name: Build Artifacts
    if: github.head_ref == 'release' && github.event.pull_request.merged == true
    uses: ./.github/workflows/_build_artifacts.yml

  release:
    name: Release
    needs: build_artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check milestone exists
        id: check_milestone
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          NUMBER=$(gh api repos/${{ github.repository }}/milestones \
            --jq ".[] | select(.title == \"v${VERSION}\") | .number")
          if [ -z "$NUMBER" ]; then
            echo "::error::No milestone found for v${VERSION}. Create it before releasing."
            exit 1
          fi
          echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: artifacts

      - uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          # renovate: datasource=github-releases depName=knope-dev/knope
          version: 0.22.3

      - run: knope release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close milestone
        run: |
          gh api repos/${{ github.repository }}/milestones/${{ steps.check_milestone.outputs.number }} \
            --method PATCH --field state=closed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
