name: Set Cargo Version
description: Sets the package version in Cargo.toml

inputs:
  version:
    description: "Version to set (e.g. 0.0.0-nightly.20260315.abc1234)"
    required: true

runs:
  using: composite
  steps:
    - name: Set version in Cargo.toml
      run: yq -i -p toml -o toml '.package.version = "${{ inputs.version }}"' Cargo.toml
      shell: bash
