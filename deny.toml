[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
# git2 0.18.3 is pinned by fyaml-sys (build-time only, not in the shipped binary).
# Remove this suppression once fyaml-sys upgrades its git2 dependency.
ignore = ["RUSTSEC-2026-0008"]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
]

[bans]
# fyaml and fyaml-sys pull in some duplicated transitive deps; allow until they
# publish stable crates.io releases and the [patch] block can be removed.
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/jonathanrainer/fyaml",
    "https://github.com/jonathanrainer/fyaml-sys",
]
