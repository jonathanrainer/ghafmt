name: ghafmt

description: Format GitHub Actions workflow and action metadata files

author: jonathanrainer

inputs:
  mode:
    description: 'Mode to run: check, write, or list'
    required: false
    default: check
  path:
    description: Path to workflow file(s) or directory to format
    required: false
    default: .github/workflows/

runs:
  using: composite
  steps:
    - name: Download ghafmt
      run: |
        VERSION=$(echo "${{ github.action_ref }}" | sed 's/^v//')

        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   TARGET="x86_64-unknown-linux-musl" ;;
          Linux-ARM64) TARGET="aarch64-unknown-linux-musl" ;;
          macOS-ARM64) TARGET="aarch64-apple-darwin" ;;
          macOS-X64)   TARGET="x86_64-apple-darwin" ;;
          *)
            echo "::error::Unsupported platform: ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac

        URL="https://github.com/jonathanrainer/ghafmt/releases/download/v${VERSION}/ghafmt-${VERSION}-${TARGET}.tar.gz"
        TARBALL="${RUNNER_TEMP}/ghafmt.tar.gz"
        curl -fsSL "$URL" -o "$TARBALL"
        EXPECTED=$(curl -fsSL "${URL}.sha256" | tr -d '[:space:]')
        ACTUAL=$(sha256sum "$TARBALL" | awk '{print $1}')
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "::error::SHA-256 checksum mismatch for ghafmt binary (expected ${EXPECTED}, got ${ACTUAL})"
          exit 1
        fi
        tar -xz -C "$RUNNER_TEMP" -f "$TARBALL"
        echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash

    - name: Run ghafmt
      run: |
        mapfile -t ACTION_FILES < <(find . \( -name "action.yml" -o -name "action.yaml" \) \
          ! -path '*/.git/*' ! -path '*/node_modules/*' 2>/dev/null)
        ghafmt "--mode=${INPUT_MODE}" "${INPUT_PATH}" "${ACTION_FILES[@]}"
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PATH: ${{ inputs.path }}
      shell: bash

branding:
  icon: check-square
  color: blue
